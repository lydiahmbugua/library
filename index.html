<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <button class="new-book">+ New Book</button>
            <form class="form" enctype="multipart/form-data">
                <fieldset>
                    <label for="book-title">Title:</label>
                    <input type="text" id="book-title" required>
                </fieldset>
                <fieldset>
                    <label for="book-author">Author:</label>
                    <input type="text" id="book-author" required>
                </fieldset>
                <fieldset>
                    <label for="book-pages">Pages:</label>
                    <input type="number" id="book-pages" required>
                </fieldset>
                <fieldset>
                    <label for="book-date">Date Completed:</label>
                    <input type="date" id="book-date" required>
                </fieldset>
                <fieldset>
                    <label for="book-cover">Book Cover:</label>
                    <input type="file" id="book-cover" class="upload" accept="image/*">
                </fieldset>
                <button type="submit" class="submit">Submit</button>
            </form>
        </div>

        <div class="cards-wrapper"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
